<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Arcade Suite</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 3rem;
            color: #0f0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
            margin-bottom: 2rem;
            text-align: center;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .menu-item {
            display: block;
            padding: 1rem 2rem;
            background-color: #333;
            color: #0f0;
            text-decoration: none;
            font-size: 1.5rem;
            border: 2px solid #0f0;
            border-radius: 5px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }
        .menu-item:hover {
            background-color: #0f0;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Retro Arcade Suite</h1>
    <div class="menu">
        <a href="snake/index.html" class="menu-item">Play Snake</a>
        <a href="tictactoe/index.html" class="menu-item">Play Tic-Tac-Toe</a>
        <a href="spaceinvaders/index.html" class="menu-item">Play Space Invaders</a>
    </div>
</body>
</html>
